[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

# Network config - LOCAL TESTING (no fork)
# eth_rpc_url tidak digunakan untuk local testing

[rpc_endpoints]
sepolia = "https://ethereum-sepolia-rpc.publicnode.com"
mainnet = "https://eth.llamarpc.com"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
